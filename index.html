<!doctype html>
<html lang="ja">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CYBER PRODUCT LIST</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Orbitron',sans-serif;
color:#00ffff;

background:
radial-gradient(circle at 20% 20%,#001122,#000000),
linear-gradient(#000000,#020220);
}


/* 上部バー */

.header{

position:fixed;
top:0;
left:0;
right:0;

height:60px;

display:flex;
align-items:center;
justify-content:center;

background:#000;

border-bottom:2px solid #00ffff;

box-shadow:0 0 20px #00ffff;

z-index:100;

}

.logoText{

font-size:22px;

letter-spacing:3px;

text-shadow:0 0 10px #00ffff;

}


/* メイン */

.container{

max-width:1200px;

margin:80px auto;

padding:10px;

}


/* カテゴリ */

.categoryTitle{

font-size:24px;

margin-top:40px;

color:#ff00ff;

text-shadow:0 0 10px #ff00ff;

}


/* 商品カード */

.productCard{

background:#000;

border:1px solid #00ffff;

border-radius:12px;

padding:12px;

margin:10px;

box-shadow:
0 0 10px #00ffff,
inset 0 0 10px #00ffff;

transition:.3s;

}


.productCard:hover{

transform:scale(1.03);

box-shadow:
0 0 30px #ff00ff,
inset 0 0 20px #ff00ff;

}


/* 商品画像 */

.productImage{

width:100%;

border-radius:8px;

border:1px solid #00ffff;

}


/* 動画 */

.productVideo{

width:100%;

border-radius:8px;

border:1px solid #00ffff;

}


/* 商品名 */

.productName{

font-size:18px;

margin-top:8px;

color:#00ffff;

}


/* 説明 */

.productDescription{

font-size:14px;

color:#bbbbbb;

}


/* グリッド */

.grid{

display:grid;

grid-template-columns:

repeat(auto-fill,minmax(220px,1fr));

gap:10px;

}

</style>

</head>

<body>


<div class="header">

<div class="logoText">

CYBER PRODUCT LIST

</div>

</div>


<div class="container" id="app">

Loading...

</div>


<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {

getFirestore,
collection,
getDocs

} from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


/* Firebase設定（そのまま） */

const firebaseConfig={

apiKey:"YOUR_API_KEY",

authDomain:"YOUR_PROJECT.firebaseapp.com",

projectId:"YOUR_PROJECT",

storageBucket:"YOUR_PROJECT.appspot.com",

messagingSenderId:"XXXX",

appId:"XXXX"

};


const app=initializeApp(firebaseConfig);

const db=getFirestore(app);



const appDiv=document.getElementById("app");


async function load(){

const categoriesSnap=
await getDocs(collection(db,"categories"));

const productsSnap=
await getDocs(collection(db,"products"));


let categories=[];

categoriesSnap.forEach(d=>{

categories.push(d.data());

});


categories.sort((a,b)=>a.order-b.order);



let products=[];

productsSnap.forEach(d=>{

products.push(d.data());

});


let html="";


categories.forEach(cat=>{

html+=`

<div class="categoryTitle">

${cat.name}

</div>

<div class="grid">

`;


products
.filter(p=>p.category===cat.name)
.sort((a,b)=>a.order-b.order)

.forEach(p=>{


html+=`


<div class="productCard">



${
p.video?

`<iframe class="productVideo"
src="${p.video}"
frameborder="0"
allowfullscreen>
</iframe>`

:

`<img class="productImage"
src="${p.image}">
`

}



<div class="productName">

${p.name}

</div>


<div class="productDescription">

${p.description||""}

</div>



</div>


`;


});


html+="</div>";

});


appDiv.innerHTML=html;


}


load();


</script>


</body>
</html>
