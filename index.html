<!doctype html>
<html lang="ja">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>MT GROUP</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="header">

<div class="logoText">
MT GROUP TERMINAL
</div>

</div>



<div class="container">


<div class="panel categories">

<h3>CONTENTS</h3>

<div id="categoryList"></div>

</div>



<div class="panel products">

<h3>PRODUCT DATABASE</h3>

<input id="searchBox"
placeholder="SEARCH PRODUCT"
oninput="searchAll()">

<div id="productList"></div>

</div>



<div class="panel detail">

<h3>DETAIL INFO</h3>

<div id="productDetail">

SELECT PRODUCT

</div>

</div>


</div>


<div id="mobileModal" class="modal"></div>




<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig={

apiKey:"AIzaSyAii9UA3YBztj3XE8QErStcf-TpIkFJYWQ",
authDomain:"mtgroup-df495.firebaseapp.com",
projectId:"mtgroup-df495",
storageBucket:"mtgroup-df495.firebasestorage.app",
messagingSenderId:"33007954637",
appId:"1:33007954637:web:0a1c249df6764f8d855784"

};


const app=initializeApp(firebaseConfig);
const db=getFirestore(app);



let categories=[];
let products=[];
let currentCategory=null;



function getYoutubeID(url){

if(!url) return null;

if(url.includes("watch?v="))
return url.split("watch?v=")[1].split("&")[0];

if(url.includes("youtu.be/"))
return url.split("youtu.be/")[1].split("?")[0];

return null;

}



function getYoutubeThumb(url){

const id=getYoutubeID(url);

if(!id) return null;

return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;

}



function getYoutubeEmbed(url){

const id=getYoutubeID(url);

if(!id) return url;

return `https://www.youtube.com/embed/${id}`;

}



const categoryList=document.getElementById("categoryList");
const productList=document.getElementById("productList");
const productDetail=document.getElementById("productDetail");
const mobileModal=document.getElementById("mobileModal");



onSnapshot(query(collection(db,"categories"),orderBy("order")),snap=>{

categories=[];

snap.forEach(doc=>{
categories.push(doc.data());
});

renderCategories();

});



onSnapshot(query(collection(db,"products"),orderBy("order")),snap=>{

products=[];

snap.forEach(doc=>{
products.push(doc.data());
});

renderProducts();

});



function renderCategories(){

categoryList.innerHTML="";

categories.forEach(cat=>{

const div=document.createElement("div");

div.className="categoryBtn";

div.innerText=cat.name;

div.onclick=()=>{

currentCategory=cat.name;
renderProducts();

};

categoryList.appendChild(div);

});

}



function renderProducts(){

productList.innerHTML="";

products

.filter(p=>!currentCategory || p.category===currentCategory)

.forEach(p=>{

const card=document.createElement("div");

card.className="card";


let img=p.image;


const yt=getYoutubeThumb(p.image);

if(yt) img=yt;



card.innerHTML=`

<img src="${img}">

<div>

<div class="title">${p.name}</div>

</div>

`;


card.onclick=()=>showDetail(p);


productList.appendChild(card);

});

}



function showDetail(p){

let media="";


if(p.image){

const yt=getYoutubeID(p.image);

if(yt){

media=`<iframe src="${getYoutubeEmbed(p.image)}" allowfullscreen></iframe>`;

}else{

media=`<img src="${p.image}">`;

}

}



const html=`

<h2>${p.name}</h2>

${media}

<br>

<div>${p.description||""}</div>

`;


if(window.innerWidth<700){

mobileModal.innerHTML=html;
mobileModal.style.display="block";

mobileModal.onclick=()=>mobileModal.style.display="none";

}else{

productDetail.innerHTML=html;

}

}



function searchAll(){

const word=document.getElementById("searchBox").value.toLowerCase();

productList.innerHTML="";

products

.filter(p=>p.name.toLowerCase().includes(word))

.forEach(p=>{

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${p.image}">

<div class="title">${p.name}</div>

`;

card.onclick=()=>showDetail(p);

productList.appendChild(card);

});

}



</script>


</body>
</html>
